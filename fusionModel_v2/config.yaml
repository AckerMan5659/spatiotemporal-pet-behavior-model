# =================================================================

# 1. 全局設置

# =================================================================

# 切換模式: "normal" 或 "abnormal"

mode: "normal"



# 推理管道配置

pipeline:

  output_dir: outputs

  min_box_size: 12

  frame_skip: 3       # ✅ 每隔3帧推理一次，1=每帧，2=跳1帧，3=跳2帧...



# =================================================================

# 2. 預訓練配置 (Phase 1: Pre-training)

# =================================================================

pretrain:

  dataset_path: "E:/Documents/kinetics_animals"

  num_classes: 85              # 這是針對 85 類 Kinetics 預訓練用的

  epochs: 50

  batch_size: 16

  lr: 1e-4

  workers: 4

  imgsz: 224

  output_dir: "outputs/pretrained"

  head: mamba

  # Mamba 專屬參數

  mamba_d_state: 16

  mamba_d_conv: 4

  mamba_expand: 2

  # LSTM 專屬參數 (如果 head 選 lstm 則生效)

  lstm_hidden: 256

  lstm_layers: 2





# =================================================================

# 3. 任務特定配置 (保留所有原始參數，僅增加微調控制)

# =================================================================

task_configs:



  # --- NORMAL 模式 ---

  normal:

    dataset_path: "D:/Desktop/PET1/cropped_dataset/normal"

    class_names: ["eat", "drink", "other"]  

    num_classes: 3             # 保留原本的功能適配

    output_model_name: "checkpoints/repvit_best_distilled_0313.onnx"



    # 3. 微调参数控制

    finetune:

      use_pretrained: True

      enabled: True

      checkpoint_path: "outputs/pretrained/best_pretrain_mamba.pth"     # 指向训练好的最佳预训练权重

      freeze_backbone: False   # 建议 False，让主干微调适应新场景

      freeze_head_temporal: False # 建议 False，让 Mamba 也跟着微调

      batch_size: 16

      output_model_name: "outputs/finetune/finetune_normal_model1.pth"



    # [保留原版所有參數名]

    recognizer:

      num_classes: 5             # 保留原本的功能適配

      timm_model: repvit_m1  # backbones: efficientformer_l1/ efficientvit_b2 / repvit_m1 / tf_mobilenetv3_small_minimal_100 / edgenext_small / mobilevitv2_050

      feature_dim: 0         # 設置為 0 開啟自動推斷

      temporal_window: 16

      use_tsm: False

      head: gru            # lstm | transformer | mamba | vmamba

      mamba_d_state: 16

      mamba_d_conv: 4

      mamba_expand: 2

      lstm_hidden: 256

      lstm_layers: 2

      imgsz: 224

      dropout: 0.2

      augment:

        scale_min: 0.9

        scale_max: 1.1

        rotate: 15

        translate: 0.1

        fliplr: 0.5

        brightness: 0.1

        contrast: 0.1







    # [保留原版所有參數名]

    recognizer:

      num_classes: 4             # 保留原本的功能適配

      timm_model: efficientformer_l1  # backbones: efficientformer_l1/ efficientvit_b2 / repvit_m1 / tf_mobilenetv3_small_minimal_100 / edgenext_small / mobilevitv2_050

      feature_dim: 0         # 設置為 0 開啟自動推斷

      temporal_window: 16

      head: mamba            # lstm | transformer | mamba

      mamba_d_state: 16

      mamba_d_conv: 4

      mamba_expand: 2

      lstm_hidden: 256

      lstm_layers: 2

      imgsz: 224

      dropout: 0.3

      augment:

        scale_min: 0.9

        scale_max: 1.1

        rotate: 15

        translate: 0.1

        fliplr: 0.5

        brightness: 0.1

        contrast: 0.1



# =================================================================

# 4. YOLO 檢測器配置

# =================================================================

detector:

  type: yolo

  model:  yolo/best3_3.pt                    #runs/detector/train22/weights/best.pt          # yolov8n.pt | yolov11n.pt | yolov12n.pt | yolov12s.pt

  conf: 0.5

  iou: 0.5

  imgsz: 640               # 640 | 416 | 224 | 320

  device: cpu               # auto 无 CUDA 自动走 cpu；有 CUDA 走 0

  tracker: bytetrack.yaml   # bytetrack.yaml | botsort.yaml | 没有就填 null

  classes: [1, 2]         # 只檢測 "dog" 2 和 "cat" 1,"bowl" 0



detector_training:

  data_yaml: "data.yaml"

  base_model: "yolov11n.pt"

  epochs: 50

  imgsz: 640

  batch_size: 16

  device: 0

  workers: 4

  project_dir: "runs/detector"

  name: "cat_dog_detector"



# =================================================================

# 5. 蒸餾配置 (Phase 3: Distillation)

# =================================================================

distillation:

  enabled: True

  mode_to_use: "abnormal"            # 指定要蒸餾哪個模式的知識

  teacher_model: "repvit_m1"      # 必須與您權重文件的架構一致 video_swin_b 不识别

  teacher_checkpoint: "/teacher/teacher_best_ab2.pth"

  student_backbone: "repvit_m1"    # 您想要壓縮到的目標

  temperature: 4.0

  alpha: 1.0

  learning_rate: 4e-5

  batch_size: 16                    # 3060 Ti 建議 BS=4 以免 OOM

  accum_steps: 4

  epochs: 50
